<section>
    <main>
        @for (category of this.categories; track $index) {
        <div class="container" (click)="openGallery(category.slug)">
            <img src="{{category.coverImage}}" alt="">
            <div class="category-name">
                <h2>{{category.title}}</h2>
            </div>
        </div>
        }
    </main>
</section>
